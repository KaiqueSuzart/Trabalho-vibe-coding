{% extends "base.html" %}
{% block title %}Entrar — Maré Clara{% endblock %}
{% block content %}
<section class="panel narrow">
  <h1>Área da equipe</h1>
  <p class="muted">Lojista ou garçom</p>
  <form method="post" class="stack">
    <label>Usuário
      <input type="text" name="username" required autofocus>
    </label>
    <label>Senha
      <input type="password" name="password" required>
    </label>
    <button type="submit" class="btn btn-primary">Entrar</button>
  </form>
  <p class="hint">Demo: <code>admin/admin</code> ou <code>garcom/garcom</code></p>
</section>
{% endblock %}
