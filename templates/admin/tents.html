{% extends "base.html" %}
{% block title %}Tendas{% endblock %}
{% block content %}
<section class="panel">
  <div class="row-between">
    <h1>Tendas</h1>
    {% include "admin/_nav.html" %}
  </div>

  <form method="post" class="stack form-grid">
    <input type="hidden" name="action" value="create">
    <label>Número <input type="number" name="number" required></label>
    <label>Zona <input name="zone" value="Areia"></label>
    <label>Capacidade <input type="number" name="capacity" value="4"></label>
    <label>Preço diário <input type="number" step="0.01" name="daily_price" value="80"></label>
    <button class="btn btn-primary" type="submit">Criar tenda</button>
  </form>

  <div class="table-wrap">
    <table>
      <thead><tr><th>Nº</th><th>Zona</th><th>Cap.</th><th>Preço</th><th>Status</th><th></th></tr></thead>
      <tbody>
        {% for t in tents %}
        <tr>
          <td>{{ t.number }}</td>
          <td colspan="4">
            <form method="post" class="inline-form wrap">
              <input type="hidden" name="action" value="update">
              <input type="hidden" name="tent_id" value="{{ t.id }}">
              <input name="zone" value="{{ t.zone }}" style="width:7rem">
              <input type="number" name="capacity" value="{{ t.capacity }}" style="width:4rem">
              <input type="number" step="0.01" name="daily_price" value="{{ t.daily_price }}" style="width:6rem">
              <select name="status">
                {% for s in ['livre','reservada','ocupada','manutencao'] %}
                  <option value="{{ s }}" {% if t.status==s %}selected{% endif %}>{{ s }}</option>
                {% endfor %}
              </select>
              <button class="btn btn-sm" type="submit">Salvar</button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
